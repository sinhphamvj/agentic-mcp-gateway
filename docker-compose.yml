services:
  gateway:
    build: .
    command: uv run amcpg serve --host 0.0.0.0 --port 8001
    environment:
      GATEWAY_CONFIG: /app/workflow.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:4317
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      - phoenix
      - database-mcp

  database-mcp:
    build: .
    command: uv run python servers/database/server.py
    environment:
      MCP_PORT: "8000"
      DB_PATH: /app/sample.db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_GRPC_PORT: "4317"
